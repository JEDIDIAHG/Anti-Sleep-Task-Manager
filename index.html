<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jedidiah's Pro Task Manager</title>
    <style>
        :root {
            --bg-dark: #0a0a0a;
            --card-bg: #161616;
            --gold: #FFD700;
            --gold-glow: rgba(255, 215, 0, 0.3);
            --danger: #ff3333;
            --cyan: #00f2ff;
            --inter: 'Inter', system-ui, -apple-system, sans-serif;
        }

        body {
            background-color: var(--bg-dark);
            color: white;
            font-family: var(--inter);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 2rem;
            min-height: 100vh;
            transition: background-color 0.8s ease;
        }

        .main-card {
            background: var(--card-bg);
            padding: 2rem;
            border-radius: 24px;
            width: 100%;
            max-width: 450px;
            border: 1px solid #222;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            margin-bottom: 2rem;
        }

        h1 { color: var(--gold); text-align: center; margin-top: 0; }

        .input-group { margin-bottom: 1.2rem; }
        label { display: block; font-size: 0.7rem; color: #888; text-transform: uppercase; font-weight: 700; margin-bottom: 0.4rem; }
        input, select {
            width: 100%;
            padding: 12px;
            background: #222;
            border: 1px solid #333;
            border-radius: 10px;
            color: white;
            box-sizing: border-box;
        }

        .btn {
            width: 100%;
            padding: 14px;
            border-radius: 10px;
            font-weight: 700;
            border: none;
            cursor: pointer;
            text-transform: uppercase;
        }
        .btn-primary { background: var(--gold); color: black; }

        .task-item {
            background: #1a1a1a;
            border-radius: 16px;
            padding: 1rem;
            margin-bottom: 1rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-left: 5px solid var(--cyan);
        }

        .priority-high { border-left-color: var(--danger); }
        .priority-med { border-left-color: var(--gold); }

        #challengeOverlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95);
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999;
        }

        .challenge-box {
            background: #111;
            padding: 3rem;
            border-radius: 30px;
            border: 2px solid var(--danger);
            text-align: center;
        }

        #mathQuestion { font-size: 2.5rem; color: var(--gold); margin-bottom: 1.5rem; }
        .ringing-bg { background-color: #330000 !important; }
    </style>
</head>
<body>

    <div id="challengeOverlay">
        <div class="challenge-box">
            <h2 style="color: var(--danger);">WAKE UP!</h2>
            <div id="mathQuestion">0 × 0</div>
            <input type="number" id="mathAnswer" style="font-size: 2rem; width: 80%; text-align: center; margin-bottom: 1rem;">
            <button class="btn btn-primary" onclick="verifyChallenge()">Verify & Stop</button>
        </div>
    </div>

    <div class="main-card">
        <h1>Task Manager Pro</h1>
        <div class="input-group">
            <label>Task</label>
            <input type="text" id="taskName" placeholder="e.g. Study SEN 121">
        </div>
        <div class="input-group">
            <label>Time</label>
            <input type="datetime-local" id="targetTime">
        </div>
        <div class="input-group">
            <label>Priority</label>
            <select id="priority">
                <option value="low">Low</option>
                <option value="med">Medium</option>
                <option value="high">High</option>
            </select>
        </div>
        <button class="btn btn-primary" onclick="addTask()">Add Task</button>
    </div>

    <div class="task-list" id="taskList" style="width: 100%; max-width: 450px;"></div>

    <audio id="alarmSound" loop preload="auto">
        <source src="alarm.mp3" type="audio/mpeg">
    </audio>

    <script>
        let tasks = JSON.parse(localStorage.getItem('jedidiahTasks')) || [];
        let currentChallengeAnswer = null;
        let activeTaskId = null;
        let alarmAudio = null;
        let audioUnlocked = false;

        window.onload = () => {
            alarmAudio = document.getElementById('alarmSound');
            
            const unlockAudio = () => {
                if (audioUnlocked) return;
                audioUnlocked = true;
                alarmAudio.play().then(() => {
                    alarmAudio.pause();
                    alarmAudio.currentTime = 0;
                }).catch(e => console.log("Unlock failed"));
            };

            document.body.addEventListener('mousedown', unlockAudio, { once: true });
            document.body.addEventListener('touchstart', unlockAudio, { once: true });
            
            renderTasks();
            setInterval(updateCountdowns, 1000);
        };

        function addTask() {
            const name = document.getElementById('taskName').value;
            const time = document.getElementById('targetTime').value;
            const priority = document.getElementById('priority').value;

            if (!name || !time) return;

            tasks.push({
                id: Date.now(),
                name: name,
                time: new Date(time).getTime(),
                priority: priority,
                isRinging: false
            });

            saveAndRender();
        }

        function saveAndRender() {
            localStorage.setItem('jedidiahTasks', JSON.stringify(tasks));
            renderTasks();
        }

        function renderTasks() {
            const listEl = document.getElementById('taskList');
            listEl.innerHTML = "";
            tasks.forEach(task => {
                const div = document.createElement('div');
                div.className = `task-item priority-${task.priority}`;
                div.innerHTML = `
                    <div>
                        <strong>${task.name}</strong>
                        <div id="count-${task.id}">--:--:--</div>
                    </div>
                    <button onclick="deleteTask(${task.id})">×</button>
                `;
                listEl.appendChild(div);
            });
        }

        function updateCountdowns() {
            const now = Date.now();
            tasks.forEach(task => {
                const diff = task.time - now;
                const countEl = document.getElementById(`count-${task.id}`);
                if (diff <= 0) {
                    if (!task.isRinging) triggerAlarm(task);
                } else if (countEl) {
                    countEl.innerText = new Date(diff).toISOString().substr(11, 8);
                }
            });
        }

        function triggerAlarm(task) {
            task.isRinging = true;
            activeTaskId = task.id;
            const n1 = Math.floor(Math.random() * 7) + 3;
            const n2 = Math.floor(Math.random() * 7) + 3;
            currentChallengeAnswer = n1 * n2;

            document.getElementById('mathQuestion').innerText = `${n1} × ${n2}`;
            document.getElementById('challengeOverlay').style.display = 'flex';
            document.body.classList.add('ringing-bg');

            if (alarmAudio) {
                alarmAudio.play().catch(() => alert("WAKE UP!"));
            }
        }

        function verifyChallenge() {
            if (parseInt(document.getElementById('mathAnswer').value) === currentChallengeAnswer) {
                if (alarmAudio) alarmAudio.pause();
                document.getElementById('challengeOverlay').style.display = 'none';
                document.body.classList.remove('ringing-bg');
                tasks = tasks.filter(t => t.id !== activeTaskId);
                saveAndRender();
            }
        }

        function deleteTask(id) {
            tasks = tasks.filter(t => t.id !== id);
            saveAndRender();
        }
    </script>
</body>
</html>
