<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jedidiah's Pro Task Manager</title>
    <style>
        :root {
            --bg-dark: #0a0a0a;
            --card-bg: #161616;
            --gold: #FFD700;
            --gold-glow: rgba(255, 215, 0, 0.3);
            --danger: #ff3333;
            --cyan: #00f2ff;
            --inter: 'Inter', system-ui, -apple-system, sans-serif;
        }

        body {
            background-color: var(--bg-dark);
            color: white;
            font-family: var(--inter);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 2rem;
            min-height: 100vh;
            transition: background-color 0.8s ease;
            overflow-x: hidden;
        }

        @keyframes goldPulse {
            0%, 100% { text-shadow: 0 0 10px var(--gold-glow); }
            50% { text-shadow: 0 0 25px var(--gold); }
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }

        .main-card {
            background: var(--card-bg);
            padding: 2rem;
            border-radius: 24px;
            width: 100%;
            max-width: 450px;
            border: 1px solid #222;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            margin-bottom: 2rem;
            z-index: 10;
        }

        h1 {
            color: var(--gold);
            text-align: center;
            animation: goldPulse 4s infinite ease-in-out;
            margin-top: 0;
        }

        .input-group { margin-bottom: 1.2rem; }
        label { display: block; font-size: 0.7rem; color: #888; text-transform: uppercase; font-weight: 700; margin-bottom: 0.4rem; }
        input, select {
            width: 100%;
            padding: 12px;
            background: #222;
            border: 1px solid #333;
            border-radius: 10px;
            color: white;
            font-size: 0.9rem;
            box-sizing: border-box;
        }
        input:focus { border-color: var(--gold); outline: none; }

        .btn {
            width: 100%;
            padding: 14px;
            border-radius: 10px;
            font-weight: 700;
            border: none;
            cursor: pointer;
            transition: 0.3s;
            text-transform: uppercase;
        }
        .btn-primary { background: var(--gold); color: black; }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 5px 15px var(--gold-glow); }

        .task-list {
            width: 100%;
            max-width: 450px;
        }

        .task-item {
            background: #1a1a1a;
            border-radius: 16px;
            padding: 1rem;
            margin-bottom: 1rem;
            border-left: 5px solid var(--cyan);
            display: flex;
            justify-content: space-between;
            align-items: center;
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .task-info h3 { margin: 0; font-size: 1rem; }
        .task-info p { margin: 0.2rem 0 0; font-size: 0.8rem; color: #aaa; }
        
        .priority-high { border-left-color: var(--danger); box-shadow: 0 0 10px rgba(255, 51, 51, 0.1); }
        .priority-med { border-left-color: var(--gold); box-shadow: 0 0 10px rgba(255, 215, 0, 0.1); }
        .priority-low { border-left-color: var(--cyan); box-shadow: 0 0 10px rgba(0, 242, 255, 0.1); }

        .countdown {
            font-family: monospace;
            color: var(--gold);
            font-weight: bold;
            font-size: 1.1rem;
        }

        .delete-btn {
            background: none;
            border: none;
            color: #555;
            cursor: pointer;
            font-size: 1.2rem;
            padding: 0 10px;
        }
        .delete-btn:hover { color: var(--danger); }

        #challengeOverlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95);
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            backdrop-filter: blur(10px);
        }

        .challenge-box {
            background: #111;
            padding: 3rem;
            border-radius: 30px;
            border: 2px solid var(--danger);
            text-align: center;
            max-width: 400px;
            animation: shake 0.5s infinite;
        }

        #mathQuestion {
            font-size: 2.5rem;
            color: var(--gold);
            margin-bottom: 1.5rem;
            font-weight: 900;
        }

        .challenge-input {
            font-size: 2rem;
            text-align: center;
            margin-bottom: 1rem;
            border: 2px solid #333;
            background: #000;
            color: white;
            width: 80%;
        }

        .ringing-bg {
            background-color: #330000 !important;
        }
    </style>
</head>
<body>

    <div id="challengeOverlay">
        <div class="challenge-box">
            <h2 style="color: var(--danger); margin-top: 0;">WAKE UP!</h2>
            <p style="color: #888; font-size: 0.8rem;">SOLVE TO STOP ALARM</p>
            <div id="mathQuestion">0 × 0</div>
            <input type="number" id="mathAnswer" class="challenge-input" placeholder="?">
            <button class="btn btn-primary" onclick="verifyChallenge()">Verify & Stop</button>
        </div>
    </div>

    <div class="main-card">
        <h1>Task Manager Pro</h1>
        
        <div class="input-group">
            <label>Task Description</label>
            <input type="text" id="taskName" placeholder="e.g. Study SEN 122">
        </div>

        <div style="display: flex; gap: 10px;">
            <div class="input-group" style="flex: 2;">
                <label>Target Time</label>
                <input type="datetime-local" id="targetTime">
            </div>
            <div class="input-group" style="flex: 1;">
                <label>Priority</label>
                <select id="priority">
                    <option value="low">Low</option>
                    <option value="med">Medium</option>
                    <option value="high">High</option>
                </select>
            </div>
        </div>

        <button class="btn btn-primary" onclick="addTask()">Add Task</button>
    </div>

    <div class="task-list" id="taskList"></div>

    <!-- Alarm Audio Element -->
    <audio id="alarmSound" loop preload="auto">
        <source src="https://cdn.pixabay.com/audio/2022/03/10/audio_7359560f33.mp3" type="audio/mpeg">
    </audio>

    <script>
        let tasks = JSON.parse(localStorage.getItem('jedidiahTasks')) || [];
        let currentChallengeAnswer = null;
        let activeTaskId = null;
        let sound; // Declared but not assigned yet

        window.onload = () => {
            sound = document.getElementById('alarmSound');
            renderTasks();
            setInterval(updateCountdowns, 1000);

            // KEY FIX: Unlock audio on the first click anywhere on the page
            document.body.addEventListener('click', () => {
                console.log("Audio unlocked");
            }, { once: true });
        };

        function addTask() {
            const name = document.getElementById('taskName').value;
            const time = document.getElementById('targetTime').value;
            const priority = document.getElementById('priority').value;

            if (!name || !time) return;

            const targetMs = new Date(time).getTime();
            if (targetMs < Date.now()) {
                alert("Choose a future time!");
                return;
            }

            tasks.push({
                id: Date.now(),
                name: name,
                time: targetMs,
                priority: priority,
                isRinging: false
            });

            saveAndRender();
            document.getElementById('taskName').value = "";
        }

        function saveAndRender() {
            localStorage.setItem('jedidiahTasks', JSON.stringify(tasks));
            renderTasks();
        }

        function renderTasks() {
            const listEl = document.getElementById('taskList');
            listEl.innerHTML = "";
            tasks.sort((a, b) => a.time - b.time);

            tasks.forEach(task => {
                const div = document.createElement('div');
                div.className = `task-item priority-${task.priority}`;
                div.innerHTML = `
                    <div class="task-info">
                        <h3>${task.name}</h3>
                        <p>${new Date(task.time).toLocaleTimeString()}</p>
                    </div>
                    <div class="countdown" id="count-${task.id}">--:--:--</div>
                    <button class="delete-btn" onclick="deleteTask(${task.id})">×</button>
                `;
                listEl.appendChild(div);
            });
        }

        function updateCountdowns() {
            const now = Date.now();
            tasks.forEach(task => {
                const diff = task.time - now;
                const countEl = document.getElementById(`count-${task.id}`);

                if (diff <= 0) {
                    if (countEl) countEl.innerText = "ALARM!";
                    if (!task.isRinging) triggerAlarm(task);
                } else {
                    const hours = Math.floor(diff / 3600000);
                    const mins = Math.floor((diff % 3600000) / 60000);
                    const secs = Math.floor((diff % 60000) / 1000);
                    if (countEl) countEl.innerText = `${String(hours).padStart(2, '0')}:${String(mins).padStart(2, '0')}:${String(secs).padStart(2, '0')}`;
                }
            });
        }

        function triggerAlarm(task) {
            task.isRinging = true;
            activeTaskId = task.id;
            
            const num1 = Math.floor(Math.random() * 10) + 3;
            const num2 = Math.floor(Math.random() * 10) + 3;
            currentChallengeAnswer = num1 * num2;
            
            document.getElementById('mathQuestion').innerText = `${num1} × ${num2}`;
            document.getElementById('challengeOverlay').style.display = 'flex';
            document.body.classList.add('ringing-bg');
            
            // Re-check sound variable in case window.onload was weird
            if (!sound) sound = document.getElementById('alarmSound');

            sound.volume = 1.0; 
            let playPromise = sound.play();

            if (playPromise !== undefined) {
                playPromise.catch(error => {
                    console.log("Autoplay prevented. Sound will play upon first interaction.");
                    // Fallback: If blocked, try to play on next click
                    document.addEventListener('click', () => { sound.play(); }, { once: true });
                });
            }
        }

        function verifyChallenge() {
            const userAnswer = parseInt(document.getElementById('mathAnswer').value);
            if (userAnswer === currentChallengeAnswer) {
                stopAlarm();
            } else {
                document.getElementById('mathAnswer').style.borderColor = 'var(--danger)';
                setTimeout(() => { document.getElementById('mathAnswer').style.borderColor = '#333'; }, 500);
                document.getElementById('mathAnswer').value = "";
            }
        }

        function stopAlarm() {
            tasks = tasks.filter(t => t.id !== activeTaskId);
            if (sound) {
                sound.pause();
                sound.currentTime = 0;
            }
            document.getElementById('challengeOverlay').style.display = 'none';
            document.body.classList.remove('ringing-bg');
            document.getElementById('mathAnswer').value = "";
            saveAndRender();
        }

        function deleteTask(id) {
            tasks = tasks.filter(t => t.id !== id);
            saveAndRender();
        }
    </script>
</body>
</html>
